<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contact — Ludara.AI</title>
  <meta name="description" content="Contact the Ludara team via email." />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ludara.AI">
  <meta property="og:title" content="Contact — Ludara.AI">
  <meta property="og:description" content="Partner, hotelier, or just curious — we'd love to hear from you.">
  <meta property="og:url" content="https://ludara.ai/contact">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact — Ludara.AI">
  <meta name="twitter:description" content="Partner, hotelier, or just curious — we'd love to hear from you.">

  <style>
    :root{
      --bg:#0e0f12; --surface:#121419; --card:#16181d; --text:#e9eef6;
      --muted:#c8d2e4; --brand:#6aa3ff; --brand-2:#8fd3ff;
      --border:#3a3e4a; --ring:rgba(106,163,255,.28);
      --gold:#b8965a; --gold-l:#d4b07a;
      --t-h1:clamp(44px,5.5vw,64px);
      --t-h2:clamp(22px,2.4vw,28px);
      --t-body:16px;
      --t-kicker:12px;
      --gap:12px
    }
    h1{font-size:var(--t-h1);line-height:1.1;margin:0 0 var(--gap);font-weight:800;letter-spacing:-.02em}
    h2,h3{font-size:var(--t-h2);line-height:1.25;margin:0 0 var(--gap);font-weight:700;letter-spacing:-.01em}
    p{font-size:var(--t-body);line-height:1.6;margin:0 0 var(--gap)}
    p:last-child{margin-bottom:0}
    *{box-sizing:border-box}
    html,body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Helvetica,Arial
    }
    a{color:var(--brand); text-decoration:none} a:hover{text-decoration:underline}
    .wrap{max-width:960px; margin:0 auto; padding:28px}
    .nav{display:flex; align-items:center; justify-content:space-between; padding:8px 0; gap:16px; flex-wrap:wrap}
    .logo a{font-weight:800; letter-spacing:.2px; color:#fff}
    .menu{display:flex; gap:18px; flex-wrap:wrap; align-items:center}
    .menu a{color:var(--muted)} .menu a.active, .menu a:hover{color:#fff}

    /* Products dropdown */
    .has-dropdown{position:relative}
    .has-dropdown > a .caret{font-size:10px;margin-left:3px;opacity:.7;display:inline-block;transition:transform .15s ease}
    .has-dropdown:hover > a .caret,.has-dropdown:focus-within > a .caret,.has-dropdown.open > a .caret{transform:rotate(180deg)}
    .dropdown{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(-4px);min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);opacity:0;visibility:hidden;transition:opacity .15s ease,transform .15s ease,visibility .15s ease;z-index:30}
    .has-dropdown:hover .dropdown,.has-dropdown:focus-within .dropdown,.has-dropdown.open .dropdown{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
    .dropdown::before{content:'';position:absolute;top:-6px;left:0;right:0;height:12px}
    .dropdown a{display:block;padding:8px 12px;border-radius:6px;color:var(--muted);text-decoration:none;font-size:14px;white-space:nowrap}
    .dropdown a:hover{background:rgba(184,150,90,.10);color:#fff;text-decoration:none}
    .hero{
      background:linear-gradient(180deg,rgba(138,180,255,.06),transparent);
      border:1px solid var(--border); border-radius:16px; padding:26px; margin:14px 0
    }
    p.lead{color:var(--muted); margin:0}
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; margin:14px 0}
    .footer{border-top:1px solid var(--border); margin-top:28px; padding:20px 0; color:var(--muted); text-align:center}
    .footer-links{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin-bottom:10px}
    .footer-links a{color:var(--muted)} .footer-links a:hover{color:#fff}

    /* Serif + gold accent */
    .serif{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;letter-spacing:-.02em}
    .serif em{font-style:italic;color:var(--gold-l)}
    .gold-rule{height:2px;width:56px;background:var(--gold);border-radius:2px;margin:14px 0 14px}

    /* Contact form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:560px){.form-grid{grid-template-columns:1fr}}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#e2e8f4}
    .form-group input,.form-group textarea{
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 13px;
      font-family:inherit;font-size:15px;font-weight:400;
      color:var(--text);outline:none;width:100%;
      transition:border-color .18s,background .18s;
    }
    .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(200,210,228,0.45)}
    .form-group input:focus,.form-group textarea:focus{border-color:var(--brand);background:rgba(106,163,255,0.05)}
    .form-group textarea{resize:vertical;min-height:90px}
    .form-btn{
      display:block;width:100%;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#04111f;border:none;padding:12px 18px;border-radius:12px;
      font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
      transition:opacity .18s,transform .15s;margin-top:4px;
    }
    .form-btn:hover{opacity:.88;transform:translateY(-1px)}
    .form-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .form-note{font-size:13px;color:#c8d2e4;margin-top:8px;text-align:center}
    .form-success{
      display:none;flex-direction:column;align-items:center;
      gap:10px;text-align:center;padding:32px 16px;
    }
    .form-success.visible{display:flex}
    .form-success-check{
      width:44px;height:44px;border-radius:50%;
      background:rgba(106,163,255,.12);border:1px solid var(--brand);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;color:var(--brand-2);
    }
    .form-success h3{font-size:20px;margin:0}
    .form-success p{color:var(--muted);margin:0;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav" aria-label="Primary">
      <div class="logo"><a href="/">Ludara.AI</a></div>
      <div class="menu">
        <a href="/">Home</a>
        <div class="has-dropdown">
          <a href="/product.html">Products <span class="caret" aria-hidden="true">▾</span></a>
          <div class="dropdown" role="menu">
            <a href="/aperfectday/" role="menuitem">A Perfect Day</a>
            <a href="/product.html#vision" role="menuitem">Broader Vision</a>
          </div>
        </div>
        <a href="/about.html">About</a>
        <a class="active" href="/contact.html">Contact</a>
      </div>
    </nav>

    <section class="hero">
      <h1 class="serif">Contact <em>us</em></h1>
      <div class="gold-rule" aria-hidden="true"></div>
      <p class="lead">Partner, hotelier, or just curious — we'd love to hear from you.</p>
    </section>

    <section class="card">
      <form id="contactForm" novalidate style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" placeholder="Jane Smith" required />
          </div>
          <div class="form-group">
            <label for="email">Your email</label>
            <input type="email" id="email" name="email" placeholder="jane@hotel.com" required />
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="hotel">Hotel / Company (optional)</label>
            <input type="text" id="hotel" name="hotel" placeholder="The Grand Hotel" />
          </div>
          <div class="form-group">
            <label for="city">City (optional)</label>
            <input type="text" id="city" name="city" placeholder="London" />
          </div>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us what you have in mind…" required></textarea>
        </div>
        <button type="submit" class="form-btn" id="submitBtn">Send message</button>
        <p class="form-note">We reply within one business day.</p>
      </form>

      <div class="form-success" id="formSuccess">
        <div class="form-success-check">✓</div>
        <h3>Message sent</h3>
        <p>Thank you — we'll be in touch within one business day.</p>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/product.html">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </div>
      © <span id="y"></span> Ludara LLC
    </footer>
  </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res = await fetch('https://formspree.io/f/mnjwakbo', {
          method: 'POST',
          body: new FormData(this),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          document.getElementById('contactForm').style.display = 'none';
          document.getElementById('formSuccess').classList.add('visible');
        } else {
          btn.disabled = false;
          btn.textContent = 'Send message';
          alert('Something went wrong. Please email maria@ludara.ai directly.');
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Send message';
        alert('Something went wrong. Please email maria@ludara.ai directly.');
      }
    });
  </script>
</body>
</html>
