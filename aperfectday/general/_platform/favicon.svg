<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#d45010"/>
    </radialGradient>
    <radialGradient id="sky" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#ff9d3a"/>
      <stop offset="100%" stop-color="#c44010"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="32" cy="32" r="30"/></clipPath>
    <clipPath id="abovehorizon"><rect x="2" y="2" width="60" height="33"/></clipPath>
  </defs>

  <!-- Circle background — sky gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#sky)"/>

  <!-- Water below horizon — slightly darker band -->
  <rect x="2" y="34" width="60" height="28" fill="#b83a0a" opacity="0.35" clip-path="url(#circle)"/>

  <!-- Horizon line -->
  <line x1="4" y1="34" x2="60" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Sun half-circle -->
  <circle cx="32" cy="34" r="13" fill="white" opacity="0.96" clip-path="url(#abovehorizon)"/>

  <!-- Sun rays -->
  <g stroke="white" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="11" x2="32" y2="6"  stroke-width="2.5"/>
    <line x1="46" y1="16" x2="49" y2="12" stroke-width="2"/>
    <line x1="53" y1="28" x2="58" y2="27" stroke-width="2"/>
    <line x1="18" y1="16" x2="15" y2="12" stroke-width="2"/>
    <line x1="11" y1="28" x2="6"  y2="27" stroke-width="2"/>
    <line x1="41" y1="13" x2="43" y2="8"  stroke-width="1.8"/>
    <line x1="23" y1="13" x2="21" y2="8"  stroke-width="1.8"/>
  </g>

  <!-- Water reflection shimmer -->
  <g stroke="white" stroke-linecap="round" opacity="0.5">
    <line x1="22" y1="41" x2="42" y2="41" stroke-width="2"/>
    <line x1="26" y1="47" x2="38" y2="47" stroke-width="1.5"/>
    <line x1="29" y1="53" x2="35" y2="53" stroke-width="1"/>
  </g>

  <!-- Circle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>
